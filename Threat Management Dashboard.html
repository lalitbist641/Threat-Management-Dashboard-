<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Threat Management Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f4f0;
      color: #1a1a18;
      min-height: 100vh;
      padding: 2rem;
    }

    /* ── Top nav ── */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #ffffff;
      border: 0.5px solid #e0dfd8;
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 24px;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-logo {
      width: 32px;
      height: 32px;
      background: #1a1a18;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-brand-name {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a18;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-time {
      font-size: 13px;
      color: #888780;
    }
    .status-badge {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      background: #eaf3de;
      color: #3b6d11;
      border: 0.5px solid #c0dd97;
      font-weight: 500;
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #e6f1fb;
      color: #185fa5;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0.5px solid #b5d4f4;
    }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .page-title {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a18;
    }
    .page-sub {
      font-size: 13px;
      color: #888780;
      margin-top: 3px;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      font-size: 13px;
      padding: 7px 14px;
      border-radius: 8px;
      border: 0.5px solid #d3d1c7;
      background: #ffffff;
      color: #1a1a18;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: #f4f4f0; border-color: #b4b2a9; }
    .btn-primary {
      background: #1a1a18;
      color: #ffffff;
      border-color: #1a1a18;
    }
    .btn-primary:hover { background: #2c2c2a; }

    /* ── Summary metrics ── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .metric-card {
      background: #ffffff;
      border: 0.5px solid #e0dfd8;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .metric-label {
      font-size: 12px;
      color: #888780;
      margin-bottom: 6px;
    }
    .metric-value {
      font-size: 26px;
      font-weight: 600;
      color: #1a1a18;
      line-height: 1;
    }
    .metric-value.small { font-size: 16px; padding-top: 5px; }
    .metric-delta {
      font-size: 11px;
      margin-top: 4px;
      color: #888780;
    }

    /* ── Main grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ── Threat card ── */
    .card {
      background: #ffffff;
      border: 0.5px solid #e0dfd8;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card-header {
      padding: 16px 18px 14px;
      border-bottom: 0.5px solid #e0dfd8;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon-red   { background: #fcebeb; }
    .icon-amber { background: #faeeda; }
    .icon-blue  { background: #e6f1fb; }

    .card-title-wrap { flex: 1; }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a18;
    }
    .card-subtitle {
      font-size: 12px;
      color: #888780;
      margin-top: 2px;
    }
    .card-badge {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 500;
    }
    .badge-red   { background: #fcebeb; color: #a32d2d; border: 0.5px solid #f7c1c1; }
    .badge-amber { background: #faeeda; color: #854f0b; border: 0.5px solid #fac775; }
    .badge-blue  { background: #e6f1fb; color: #185fa5; border: 0.5px solid #b5d4f4; }

    .card-body { padding: 14px 18px; flex: 1; }

    /* file list container */
    .file-list-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 9px;
      border: 0.5px solid #e0dfd8;
      background: #f9f9f6;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .file-row:hover { border-color: #b4b2a9; background: #f4f4f0; }
    .file-row:active { background: #eeedeb; }

    .file-click-area {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .file-icon-wrap { flex-shrink: 0; }
    .file-meta { flex: 1; min-width: 0; }
    .file-name {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a18;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-detail {
      font-size: 11px;
      color: #888780;
      margin-top: 2px;
    }
    .remove-file-btn {
      flex-shrink: 0;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #b4b2a9;
      transition: color 0.15s, background 0.15s;
    }
    .remove-file-btn:hover {
      color: #a32d2d;
      background: #fcebeb;
    }

    .add-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 9px;
      border: 0.5px dashed #d3d1c7;
      cursor: pointer;
      color: #888780;
      font-size: 13px;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-row:hover { border-color: #888780; color: #444441; }

    .card-footer {
      padding: 11px 18px;
      border-top: 0.5px solid #e0dfd8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fafaf8;
    }
    .footer-info { font-size: 12px; color: #888780; }
    .footer-link {
      font-size: 12px;
      color: #185fa5;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .footer-link:hover { text-decoration: underline; }

    /* MODAL STYLES */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
    }
    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .modal-container {
      background: #ffffff;
      border-radius: 20px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 35px rgba(0,0,0,0.2);
      border: 0.5px solid #e0dfd8;
    }
    .modal-header {
      padding: 18px 20px;
      border-bottom: 0.5px solid #e0dfd8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 { font-size: 18px; font-weight: 600; }
    .close-modal {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #888780;
    }
    .modal-body { padding: 20px; }
    .threat-description { margin-bottom: 20px; font-size: 14px; color: #2c2c2a; line-height: 1.4; }
    .progress-section { margin: 20px 0; }
    .progress-bar-container {
      background: #e0dfd8;
      border-radius: 20px;
      height: 8px;
      overflow: hidden;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: #a32d2d;
      transition: width 0.1s linear;
    }
    .steps-timeline {
      margin-top: 16px;
      font-size: 12px;
      color: #555;
    }
    .step { margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .step.active .step-dot { background: #185fa5; box-shadow: 0 0 0 2px #b5d4f4; }
    .file-list-modal .file-row { margin-bottom: 8px; cursor: default; }
    .file-list-modal .file-click-area { cursor: pointer; }
    .modal-btn-sm {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
      background: #f4f4f0;
      border: 0.5px solid #d3d1c7;
      cursor: pointer;
      margin-left: 6px;
    }
    .modal-btn-sm:hover { background: #e0dfd8; }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .metrics { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-brand">
      <div class="nav-logo">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="2" width="5" height="5" rx="1" fill="white"/>
          <rect x="9" y="2" width="5" height="5" rx="1" fill="white" opacity="0.7"/>
          <rect x="2" y="9" width="5" height="5" rx="1" fill="white" opacity="0.7"/>
          <rect x="9" y="9" width="5" height="5" rx="1" fill="white" opacity="0.4"/>
        </svg>
      </div>
      <span class="nav-brand-name">ThreatDesk</span>
    </div>
    <div class="nav-right">
      <span class="nav-time" id="live-time"></span>
      <span class="status-badge">&#x25CF;&nbsp; System active</span>
      <div class="avatar">AD</div>
    </div>
  </nav>

  <!-- Page header -->
  <div class="page-header">
    <div>
      <h1 class="page-title">Threat management</h1>
      <p class="page-sub">Manage and monitor all threat categories from one place</p>
    </div>
    <div class="header-actions">
      <button class="btn" id="exportBtn">Export</button>
      <button class="btn btn-primary" id="globalUploadBtn">+ Upload file</button>
    </div>
  </div>

  <!-- Summary metrics -->
  <div class="metrics">
    <div class="metric-card">
      <p class="metric-label">Total files</p>
      <p class="metric-value" id="totalFilesCount">0</p>
      <p class="metric-delta">Across all sections</p>
    </div>
    <div class="metric-card">
      <p class="metric-label">Sections</p>
      <p class="metric-value">3</p>
      <p class="metric-delta">Active categories</p>
    </div>
    <div class="metric-card">
      <p class="metric-label">Total size</p>
      <p class="metric-value" id="totalSizeValue">0 MB</p>
      <p class="metric-delta">Placeholder files</p>
    </div>
    <div class="metric-card">
      <p class="metric-label">Last updated</p>
      <p class="metric-value small" id="last-updated">—</p>
      <p class="metric-delta">Auto-refreshed</p>
    </div>
  </div>

  <!-- Threat cards grid -->
  <div class="grid" id="cardsGrid"></div>

  <!-- Threat Behaviour Modal -->
  <div id="threatModal" class="modal-overlay">
    <div class="modal-container">
      <div class="modal-header">
        <h3 id="threatModalTitle">Threat Analysis</h3>
        <button class="close-modal" onclick="closeThreatModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div id="threatDescription" class="threat-description"></div>
        <div class="progress-section">
          <div class="progress-bar-container"><div id="progressFill" class="progress-fill"></div></div>
          <div id="stepsContainer" class="steps-timeline"></div>
        </div>
        <button class="btn" style="margin-top: 16px;" onclick="closeThreatModal()">Close</button>
      </div>
    </div>
  </div>

  <!-- View All Modal -->
  <div id="viewAllModal" class="modal-overlay">
    <div class="modal-container" style="max-width: 550px;">
      <div class="modal-header">
        <h3 id="viewAllTitle">Files</h3>
        <button class="close-modal" onclick="closeViewAllModal()">&times;</button>
      </div>
      <div class="modal-body" id="viewAllBody"></div>
    </div>
  </div>

  <script>
    // ----------------------- DATA STATE -------------------------
    const categories = [
      { key: 'ransomware', title: 'Ransomware', subtitle: 'Encryption-based threats', badge: 'High risk', badgeClass: 'badge-red', iconBg: 'icon-red', risk: 'ransomware' },
      { key: 'virus', title: 'Virus', subtitle: 'Malicious code samples', badge: 'Medium risk', badgeClass: 'badge-amber', iconBg: 'icon-amber', risk: 'virus' },
      { key: 'rat', title: 'Remote access / SSL', subtitle: 'Connection & tunnel tools', badge: 'Monitored', badgeClass: 'badge-blue', iconBg: 'icon-blue', risk: 'rat' }
    ];

    // initial files: each with name, sizeBytes, sizeFormatted, description, threatType
    const initialFiles = {
      ransomware: [{ name: 'ransom_payload.exe', sizeBytes: 2.4 * 1024 * 1024, sizeFormatted: '2.4 MB', description: 'Dummy placeholder · Sample', threatType: 'ransomware' }],
      virus: [{ name: 'virus_sample.exe', sizeBytes: 1.1 * 1024 * 1024, sizeFormatted: '1.1 MB', description: 'Dummy placeholder · Sample', threatType: 'virus' }],
      rat: [{ name: 'rat_tool.exe', sizeBytes: 3.8 * 1024 * 1024, sizeFormatted: '3.8 MB', description: 'Dummy placeholder · Sample', threatType: 'rat' }]
    };

    let categoryFiles = {
      ransomware: [...initialFiles.ransomware],
      virus: [...initialFiles.virus],
      rat: [...initialFiles.rat]
    };

    // Helper: format bytes
    function formatBytes(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // update global metrics (total files, total size, last updated)
    function updateGlobalMetrics() {
      let totalFiles = 0;
      let totalSize = 0;
      for (let cat of ['ransomware', 'virus', 'rat']) {
        totalFiles += categoryFiles[cat].length;
        totalSize += categoryFiles[cat].reduce((sum, f) => sum + f.sizeBytes, 0);
      }
      document.getElementById('totalFilesCount').innerText = totalFiles;
      document.getElementById('totalSizeValue').innerText = formatBytes(totalSize);
    }

    function updateLastUpdated() {
      const now = new Date();
      document.getElementById('last-updated').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    // re-render a specific category card
    function renderCategoryCard(catKey) {
      const cat = categories.find(c => c.key === catKey);
      if (!cat) return;
      const files = categoryFiles[catKey];
      const totalSize = files.reduce((sum, f) => sum + f.sizeBytes, 0);
      const fileCount = files.length;

      const cardContainer = document.getElementById(`card-${catKey}`);
      if (!cardContainer) return;

      // update footer
      const footerInfo = cardContainer.querySelector('.footer-info');
      if (footerInfo) footerInfo.innerText = `${fileCount} file${fileCount !== 1 ? 's' : ''} · ${formatBytes(totalSize)}`;

      // rebuild file list
      const fileListContainer = cardContainer.querySelector('.file-list-container');
      if (!fileListContainer) return;
      fileListContainer.innerHTML = '';
      files.forEach((file, idx) => {
        const fileRow = document.createElement('div');
        fileRow.className = 'file-row';
        // click area for download + behaviour
        const clickArea = document.createElement('div');
        clickArea.className = 'file-click-area';
        clickArea.innerHTML = `
          <div class="file-icon-wrap">
            <svg width="30" height="34" viewBox="0 0 30 34" fill="none">
              <rect x="1" y="1" width="28" height="32" rx="3.5" fill="#f9f9f6" stroke="#e0dfd8" stroke-width="0.5"/>
              <path d="M18 1v8h8" stroke="#e0dfd8" stroke-width="0.5" fill="none"/>
              <polygon points="18,1 26,9 18,9" fill="#f0efea"/>
              <text x="15" y="24" text-anchor="middle" font-size="7" font-weight="600" fill="${catKey === 'ransomware' ? '#a32d2d' : catKey === 'virus' ? '#854f0b' : '#185fa5'}" font-family="inherit">${file.name.split('.').pop()}</text>
            </svg>
          </div>
          <div class="file-meta">
            <p class="file-name">${escapeHtml(file.name)}</p>
            <p class="file-detail">${file.sizeFormatted} &nbsp;·&nbsp; ${file.description}</p>
          </div>
        `;
        clickArea.addEventListener('click', (e) => {
          e.stopPropagation();
          downloadAndShowBehaviour(file, catKey);
        });
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-file-btn';
        removeBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4v-1a1 1 0 011-1h2a1 1 0 011 1v1M4 4v7a1 1 0 001 1h4a1 1 0 001-1V4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M6 7v3M8 7v3" stroke="currentColor" stroke-width="1.2"/></svg>`;
        removeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          removeFileFromCategory(catKey, idx);
        });
        fileRow.appendChild(clickArea);
        fileRow.appendChild(removeBtn);
        fileListContainer.appendChild(fileRow);
      });
      if (files.length === 0) {
        const emptyMsg = document.createElement('div');
        emptyMsg.className = 'file-row';
        emptyMsg.style.justifyContent = 'center';
        emptyMsg.style.color = '#888780';
        emptyMsg.innerText = 'No files';
        emptyMsg.style.cursor = 'default';
        fileListContainer.appendChild(emptyMsg);
      }
    }

    function removeFileFromCategory(catKey, index) {
      categoryFiles[catKey].splice(index, 1);
      renderCategoryCard(catKey);
      updateGlobalMetrics();
      updateLastUpdated();
      // if viewAll modal is open for this category, refresh it
      if (window.activeViewAllCategory === catKey && document.getElementById('viewAllModal').classList.contains('active')) {
        renderViewAllModalContent(catKey);
      }
    }

    function renderAllCards() {
      categories.forEach(cat => {
        renderCategoryCard(cat.key);
      });
      updateGlobalMetrics();
    }

    // download + threat modal
    function downloadAndShowBehaviour(file, catKey) {
      // download blob
      const content = `This is a dummy ${catKey} simulation file: ${file.name}. Contains harmless text for security training.`;
      const blob = new Blob([content], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = file.name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      // show threat modal with details
      showThreatModal(catKey, file.name);
      updateLastUpdated();
    }

    // Threat behaviour modal with progress steps
    let progressInterval = null;
    function showThreatModal(catKey, fileName) {
      const modal = document.getElementById('threatModal');
      const titleMap = { ransomware: 'Ransomware Threat', virus: 'Virus Behaviour', rat: 'RAT / SSL Backdoor' };
      const descMap = {
        ransomware: 'Encrypts user files, demands Bitcoin payment, leaves ransom note (e.g., README.txt). Ransomware spreads via phishing emails or exploit kits.',
        virus: 'Self‑replicates by attaching to executables, corrupts system files, spreads via USB drives and network shares.',
        rat: 'Remote Access Tool: enables remote control, keylogging, screen capture, and data exfiltration. Often delivered via trojans.'
      };
      document.getElementById('threatModalTitle').innerText = titleMap[catKey] || 'Threat Analysis';
      document.getElementById('threatDescription').innerHTML = `<strong>${escapeHtml(fileName)}</strong><br>${descMap[catKey]}`;
      
      // steps based on category
      let steps = [];
      if (catKey === 'ransomware') steps = ['File enumeration', 'AES encryption start', 'Ransom note dropped', 'Bitcoin demand'];
      else if (catKey === 'virus') steps = ['Code injection', 'File infection', 'Replication trigger', 'System corruption'];
      else steps = ['Reverse connection', 'Persistence installation', 'Keylogger active', 'Data exfiltration'];
      
      const stepsContainer = document.getElementById('stepsContainer');
      stepsContainer.innerHTML = steps.map((step, i) => `<div class="step" data-stepidx="${i}"><span class="step-dot"></span><span>${step}</span></div>`).join('');
      const progressFill = document.getElementById('progressFill');
      progressFill.style.width = '0%';
      if (progressInterval) clearInterval(progressInterval);
      let width = 0;
      progressInterval = setInterval(() => {
        width += 5;
        if (width >= 100) {
          width = 100;
          clearInterval(progressInterval);
          progressInterval = null;
        }
        progressFill.style.width = width + '%';
        const stepIndex = Math.floor((width / 100) * steps.length);
        document.querySelectorAll('#stepsContainer .step').forEach((stepEl, idx) => {
          if (idx <= stepIndex) stepEl.classList.add('active');
          else stepEl.classList.remove('active');
        });
      }, 150);
      
      modal.classList.add('active');
    }
    function closeThreatModal() {
      if (progressInterval) clearInterval(progressInterval);
      document.getElementById('threatModal').classList.remove('active');
    }

    // View all modal logic
    window.activeViewAllCategory = null;
    function renderViewAllModalContent(catKey) {
      const files = categoryFiles[catKey];
      const container = document.getElementById('viewAllBody');
      container.innerHTML = '';
      if (files.length === 0) {
        container.innerHTML = '<p style="color:#888; text-align:center;">No files in this category</p>';
        return;
      }
      files.forEach((file, idx) => {
        const row = document.createElement('div');
        row.className = 'file-row';
        row.style.marginBottom = '8px';
        const clickArea = document.createElement('div');
        clickArea.className = 'file-click-area';
        clickArea.innerHTML = `
          <div class="file-icon-wrap">
            <svg width="26" height="30" viewBox="0 0 30 34" fill="none"><rect x="1" y="1" width="28" height="32" rx="3.5" fill="#f9f9f6" stroke="#e0dfd8"/><text x="15" y="24" text-anchor="middle" font-size="7" font-weight="600" fill="#1a1a18">${file.name.split('.').pop()}</text></svg>
          </div>
          <div class="file-meta"><p class="file-name">${escapeHtml(file.name)}</p><p class="file-detail">${file.sizeFormatted}</p></div>
        `;
        clickArea.addEventListener('click', () => downloadAndShowBehaviour(file, catKey));
        const btnGroup = document.createElement('div');
        btnGroup.style.display = 'flex';
        btnGroup.style.gap = '6px';
        const downloadBtn = document.createElement('button');
        downloadBtn.innerText = 'Download';
        downloadBtn.className = 'modal-btn-sm';
        downloadBtn.addEventListener('click', (e) => { e.stopPropagation(); downloadAndShowBehaviour(file, catKey); });
        const removeBtn = document.createElement('button');
        removeBtn.innerText = 'Remove';
        removeBtn.className = 'modal-btn-sm';
        removeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          removeFileFromCategory(catKey, idx);
          renderViewAllModalContent(catKey);
        });
        btnGroup.appendChild(downloadBtn);
        btnGroup.appendChild(removeBtn);
        row.appendChild(clickArea);
        row.appendChild(btnGroup);
        container.appendChild(row);
      });
    }
    function showViewAllModal(catKey) {
      window.activeViewAllCategory = catKey;
      const cat = categories.find(c => c.key === catKey);
      document.getElementById('viewAllTitle').innerText = `${cat.title} – All Files`;
      renderViewAllModalContent(catKey);
      document.getElementById('viewAllModal').classList.add('active');
    }
    function closeViewAllModal() {
      document.getElementById('viewAllModal').classList.remove('active');
      window.activeViewAllCategory = null;
    }

    // Add file via picker
    function addFileToCategory(catKey, fileObj) {
      const newFile = {
        name: fileObj.name,
        sizeBytes: fileObj.size,
        sizeFormatted: formatBytes(fileObj.size),
        description: 'Simulated threat sample',
        threatType: catKey
      };
      categoryFiles[catKey].push(newFile);
      renderCategoryCard(catKey);
      updateGlobalMetrics();
      updateLastUpdated();
      if (window.activeViewAllCategory === catKey && document.getElementById('viewAllModal').classList.contains('active')) {
        renderViewAllModalContent(catKey);
      }
    }

    function triggerFileUpload(catKey) {
      const input = document.createElement('input');
      input.type = 'file';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          addFileToCategory(catKey, file);
        }
      };
      input.click();
    }

    // global upload + category selector
    function globalUpload() {
      const input = document.createElement('input');
      input.type = 'file';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        // custom category picker modal
        const catChoice = prompt('Select category: enter number\n1: Ransomware\n2: Virus\n3: Remote access / SSL');
        let targetCat = null;
        if (catChoice === '1') targetCat = 'ransomware';
        else if (catChoice === '2') targetCat = 'virus';
        else if (catChoice === '3') targetCat = 'rat';
        else { alert('Invalid selection, default to Ransomware'); targetCat = 'ransomware'; }
        addFileToCategory(targetCat, file);
      };
      input.click();
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // build dynamic cards
    function buildCardsStructure() {
      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = '';
      categories.forEach(cat => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${cat.key}`;
        card.innerHTML = `
          <div class="card-header">
            <div class="card-icon ${cat.iconBg}">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="2" fill="currentColor" color="#a32d2d"/></svg>
            </div>
            <div class="card-title-wrap"><p class="card-title">${cat.title}</p><p class="card-subtitle">${cat.subtitle}</p></div>
            <span class="card-badge ${cat.badgeClass}">${cat.badge}</span>
          </div>
          <div class="card-body">
            <div class="file-list-container"></div>
            <div class="add-row" data-category="${cat.key}">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="1.3"/></svg>
              Add file
            </div>
          </div>
          <div class="card-footer">
            <span class="footer-info">0 files · 0 MB</span>
            <button class="footer-link view-all-btn" data-category="${cat.key}">View all →</button>
          </div>
        `;
        grid.appendChild(card);
        const addRow = card.querySelector('.add-row');
        addRow.addEventListener('click', (e) => { e.stopPropagation(); triggerFileUpload(cat.key); });
        const viewBtn = card.querySelector('.view-all-btn');
        viewBtn.addEventListener('click', () => showViewAllModal(cat.key));
      });
      renderAllCards();
    }

    // live clock
    function updateTime() {
      const now = new Date();
      document.getElementById('live-time').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    updateTime();
    setInterval(updateTime, 30000);
    updateLastUpdated();

    // export placeholder
    document.getElementById('exportBtn').addEventListener('click', () => alert('Export feature: mock action'));
    document.getElementById('globalUploadBtn').addEventListener('click', globalUpload);
    window.closeThreatModal = closeThreatModal;
    window.closeViewAllModal = closeViewAllModal;

    // init
    buildCardsStructure();
  </script>
</body>
</html>
